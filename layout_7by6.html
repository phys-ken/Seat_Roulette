<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>座席ルーレット 7×6レイアウト（42席対応）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── 黒板投影向け横長レイアウト ── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;  /* 黒板カラー */
      color: #fff;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 5vw;
      margin: 2vh 0 1vh;
      letter-spacing: 0.1em;
    }

    #controls {
      margin-bottom: 2vh;
    }

    button {
      font-size: 2.2vw;
      padding: 1vh 3vw;
      margin: 0 1vw;
      border: none;
      border-radius: 1vw;
      background: #2e7d32;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    table {
      border-collapse: collapse;
      width: 90vw;
      table-layout: fixed;
    }

    td {
      border: 0.4vh solid #fff;
      height: 10vh;
      text-align: center;
      font-size: 3.5vw;
      user-select: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    td.active {
      background-color: #1a1a1a;
    }

    td.inactive {
      background-color: #800;
      opacity: 0.6;
    }

    #info {
      margin-bottom: 1vh;
      font-size: 2vw;
    }
  </style>
</head>
<body>
  <h1>座席ルーレット (7×6)</h1>

  <div id="info">
    有効座席数: <span id="activeCount">42</span> / 42 （座席をクリックで有効・無効切替）
  </div>

  <div id="controls">
    <button id="startBtn">シャッフル開始</button>
    <button id="stopBtn" disabled>ストップ</button>
    <button id="resetBtn">全座席有効化</button>
    <button id="downloadBtn" disabled>確定 & Excel ダウンロード</button>
  </div>

  <table id="seatTable"></table>

  <script>
    /* ===== グリッド設定：横 7 列 × 縦 6 行 ===== */
    const ROWS = 6;
    const COLS = 7;

    /* ===== 生徒番号 1〜42 を配列化 ===== */
    const students = Array.from({ length: 42 }, (_, i) => i + 1);

    // 座席の有効・無効状態を管理 (true = 有効, false = 無効)
    const seatActive = new Array(ROWS * COLS).fill(true);

    // 現在の座席配列
    const seatNumbers = [...students];

    /* ===== テーブル生成 ===== */
    const table = document.getElementById("seatTable");
    for (let r = 0; r < ROWS; r++) {
      const tr = document.createElement("tr");
      for (let c = 0; c < COLS; c++) {
        const td = document.createElement("td");
        td.id = `seat-${r}-${c}`;
        td.dataset.row = r;
        td.dataset.col = c;
        td.className = "active";
        
        // クリックイベントでの有効・無効切替
        td.addEventListener("click", () => {
          if (timer) return; // シャッフル中はクリック無効
          
          const seatIndex = r * COLS + c;
          seatActive[seatIndex] = !seatActive[seatIndex];
          
          if (seatActive[seatIndex]) {
            td.className = "active";
          } else {
            td.className = "inactive";
          }
          
          updateActiveCount();
          arrangeStudentsInOrder(); // 座席クリック時は順番配置
        });
        
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }

    /* ===== 便利関数 ===== */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function updateActiveCount() {
      const activeSeats = seatActive.filter(active => active).length;
      document.getElementById("activeCount").textContent = activeSeats;
    }

    function redistributeStudents() {
      // 有効な座席数を取得
      const activeSeats = seatActive.filter(active => active).length;
      
      // 有効座席数分の生徒番号を準備
      const activeStudents = students.slice(0, activeSeats);
      
      // シャッフル
      shuffle(activeStudents);
      
      // 座席に配置
      let studentIndex = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          seatNumbers[seatIndex] = seatActive[seatIndex] ? (activeStudents[studentIndex++] || "") : "";
        }
      }
      
      render();
    }

    function arrangeStudentsInOrder() {
      // 有効な座席数を取得
      const activeSeats = seatActive.filter(active => active).length;
      
      // 有効座席数分の生徒番号を準備（順番通り）
      const activeStudents = students.slice(0, activeSeats);
      
      // 座席に配置（右上から下に向かって、列ごとに左に移動）
      let studentIndex = 0;
      for (let c = COLS - 1; c >= 0; c--) { // 右の列から左へ
        for (let r = 0; r < ROWS; r++) { // 上から下へ
          const seatIndex = r * COLS + c;
          if (seatActive[seatIndex]) {
            seatNumbers[seatIndex] = activeStudents[studentIndex++] || "";
          } else {
            seatNumbers[seatIndex] = "";
          }
        }
      }
      
      render();
    }

    function render() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          const seatIndex = r * COLS + c;
          
          if (seatActive[seatIndex]) {
            cell.textContent = seatNumbers[seatIndex] || "";
          } else {
            cell.textContent = "×";
          }
        }
      }
    }

    /* ===== ルーレット制御 ===== */
    let timer = null;

    document.getElementById("startBtn").addEventListener("click", () => {
      if (timer) return;
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("downloadBtn").disabled = true;
      timer = setInterval(() => {
        redistributeStudents();
      }, 150);
    });

    document.getElementById("stopBtn").addEventListener("click", () => {
      clearInterval(timer);
      timer = null;
      document.getElementById("stopBtn").disabled = true;
      document.getElementById("downloadBtn").disabled = false;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (timer) return; // シャッフル中は無効
      
      // 全座席を有効化
      seatActive.fill(true);
      
      // 見た目を更新
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          cell.className = "active";
        }
      }
      
      updateActiveCount();
      arrangeStudentsInOrder(); // 全座席有効化時も順番配置
    });

    /* ===== Excel 出力 ===== */
    document.getElementById("downloadBtn").addEventListener("click", () => {
      // タイムスタンプ生成 (yyyymmddHHmm)
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      const minute = String(now.getMinutes()).padStart(2, '0');
      const timestamp = `${year}${month}${day}${hour}${minute}`;
      
      // 17行8列の配列を作成
      const aoa = new Array(17).fill(null).map(() => new Array(8).fill(""));
      
      // ヘッダー情報
      aoa[0][3] = "教卓(生徒目線)"; // D1
      aoa[0][6] = "座席シャッフルWEBアプリ（phys-ken）"; // G1
      aoa[16][3] = "教卓(教師目線)"; // D17
      
      // 生徒目線座席表（A2:G7）
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          if (seatActive[seatIndex]) {
            aoa[r + 1][c] = seatNumbers[seatIndex] || "";
          } else {
            aoa[r + 1][c] = "×";
          }
        }
      }
      
      // 教師目線座席表（A11:G16）- 180度回転
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          
          // 180度回転の座標変換
          // 生徒目線の(r,c)は教師目線では(ROWS-1-r, COLS-1-c)
          const teacherRow = ROWS - 1 - r;
          const teacherCol = COLS - 1 - c;
          
          // 教師目線の配列位置（A11から始まるので+10）
          const excelRow = teacherRow + 10;
          const excelCol = teacherCol;
          
          if (seatActive[seatIndex]) {
            aoa[excelRow][excelCol] = seatNumbers[seatIndex] || "";
          } else {
            aoa[excelRow][excelCol] = "×";
          }
        }
      }
      
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      
      // G1セルにハイパーリンクを設定
      if (!ws['!links']) ws['!links'] = [];
      ws['!links'].push({
        ref: 'G1',
        Target: 'https://phys-ken.github.io/Seat_Roulette/',
        Tooltip: '座席シャッフルWEBアプリ'
      });
      
      XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
      XLSX.writeFile(wb, `zaseki_${timestamp}.xlsx`);
    });

    /* ===== 初期表示 ===== */
    arrangeStudentsInOrder(); // 初期表示は順番配置
  </script>
</body>
</html>
