<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>座席ルーレット カスタムレイアウト（可変サイズ対応）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── 黒板投影向け横長レイアウト ── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh; /* 100%から変更 */
      background: #000;  /* 黒板カラー */
      color: #fff;
      overflow-x: auto; /* 横スクロール許可 */
      overflow-y: auto; /* 縦スクロール許可 */
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 4vw;
      margin: 1vh 0;
      letter-spacing: 0.1em;
    }

    #topControls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95%;
      margin-bottom: 1vh;
    }

    #controls {
      display: flex;
      gap: 1vw;
    }

    #customControls {
      display: flex;
      align-items: center;
      gap: 1vw;
      background: rgba(255, 255, 255, 0.1);
      padding: 1vh 2vw;
      border-radius: 1vw;
    }

    button {
      font-size: 1.5vw;
      padding: 0.8vh 2vw;
      border: none;
      border-radius: 0.8vw;
      background: #2e7d32;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background: #4caf50;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    button:disabled:hover {
      background: #555;
    }

    .small-btn {
      font-size: 1.2vw;
      padding: 0.5vh 1vw;
      min-width: 2.5vw;
    }

    input[type="number"] {
      width: 3vw;
      font-size: 1.5vw;
      padding: 0.5vh;
      text-align: center;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 0.5vw;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5vw;
    }

    .control-label {
      font-size: 1.3vw;
      white-space: nowrap;
    }

    table {
      border-collapse: collapse;
      width: max(90vw, 800px); /* 最小幅を確保 */
      max-width: none; /* 最大幅制限を解除 */
      table-layout: fixed;
      margin-top: 1vh;
      margin-bottom: 2vh; /* 下部マージン追加 */
    }

    td {
      border: 0.3vh solid #fff;
      height: max(6vh, 40px); /* 最小高さを確保 */
      min-width: 40px; /* 最小幅を確保 */
      text-align: center;
      font-size: max(2.5vw, 16px); /* 最小フォントサイズを確保 */
      user-select: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    td.active {
      background-color: #1a1a1a;
    }

    td.inactive {
      background-color: #800;
      opacity: 0.6;
    }

    #info {
      margin-bottom: 1vh;
      font-size: 1.8vw;
    }

    /* レスポンシブ調整 */
    @media (max-width: 1200px) {
      h1 { font-size: 5vw; }
      button { font-size: 2vw; padding: 1vh 2.5vw; }
      .small-btn { font-size: 1.5vw; padding: 0.7vh 1.2vw; }
      input[type="number"] { width: 4vw; font-size: 2vw; }
      .control-label { font-size: 1.8vw; }
      td { 
        font-size: max(3vw, 14px); 
        height: max(7vh, 35px);
        min-width: 35px;
      }
      #info { font-size: 2.2vw; }
    }
    
    /* 大きなグリッド用の調整 */
    @media (min-width: 1201px) {
      td {
        font-size: max(1.8vw, 18px);
        height: max(5vh, 45px);
        min-width: 50px;
      }
    }
  </style>
</head>
<body>
  <h1>座席ルーレット カスタム</h1>

  <div id="info">
    有効座席数: <span id="activeCount">0</span> / <span id="totalCount">0</span> （座席をクリックで有効・無効切替）
  </div>

  <div id="topControls">
    <div id="controls">
      <button id="startBtn">シャッフル開始</button>
      <button id="stopBtn" disabled>ストップ</button>
      <button id="resetBtn">全座席有効化</button>
      <button id="downloadBtn">Excel ダウンロード</button>
    </div>

    <div id="customControls">
      <div class="control-group">
        <span class="control-label">行:</span>
        <button class="small-btn" id="rowDecBtn">-</button>
        <input type="number" id="rowInput" min="1" max="12" value="6">
        <button class="small-btn" id="rowIncBtn">+</button>
      </div>
      <div class="control-group">
        <span class="control-label">列:</span>
        <button class="small-btn" id="colDecBtn">-</button>
        <input type="number" id="colInput" min="1" max="15" value="7">
        <button class="small-btn" id="colIncBtn">+</button>
      </div>
    </div>
  </div>

  <table id="seatTable"></table>

  <script>
    /* ===== グリッド設定：可変 ===== */
    let ROWS = 6;
    let COLS = 7;

    /* ===== 座席管理 ===== */
    let seatActive = [];
    let seatNumbers = [];
    let students = [];

    /* ===== テーブル生成関数 ===== */
    function generateTable() {
      const totalSeats = ROWS * COLS;
      students = Array.from({ length: totalSeats }, (_, i) => i + 1);
      seatActive = new Array(totalSeats).fill(true);
      seatNumbers = [...students];

      const table = document.getElementById("seatTable");
      table.innerHTML = ""; // 既存のテーブルをクリア

      for (let r = 0; r < ROWS; r++) {
        const tr = document.createElement("tr");
        for (let c = 0; c < COLS; c++) {
          const td = document.createElement("td");
          td.id = `seat-${r}-${c}`;
          td.dataset.row = r;
          td.dataset.col = c;
          td.className = "active";
          
          // クリックイベントでの有効・無効切替
          td.addEventListener("click", () => {
            if (timer) return; // シャッフル中はクリック無効
            
            const seatIndex = r * COLS + c;
            seatActive[seatIndex] = !seatActive[seatIndex];
            
            if (seatActive[seatIndex]) {
              td.className = "active";
            } else {
              td.className = "inactive";
            }
            
            updateActiveCount();
            arrangeStudentsInOrder(); // 座席クリック時は順番配置
          });
          
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
      
      updateActiveCount();
      arrangeStudentsInOrder();
    }

    /* ===== 便利関数 ===== */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function updateActiveCount() {
      const activeSeats = seatActive.filter(active => active).length;
      const totalSeats = ROWS * COLS;
      document.getElementById("activeCount").textContent = activeSeats;
      document.getElementById("totalCount").textContent = totalSeats;
    }

    function redistributeStudents() {
      // 有効な座席数を取得
      const activeSeats = seatActive.filter(active => active).length;
      
      // 有効座席数分の生徒番号を準備
      const activeStudents = students.slice(0, activeSeats);
      
      // シャッフル
      shuffle(activeStudents);
      
      // 座席に配置
      let studentIndex = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          seatNumbers[seatIndex] = seatActive[seatIndex] ? (activeStudents[studentIndex++] || "") : "";
        }
      }
      
      render();
    }

    function arrangeStudentsInOrder() {
      // 有効な座席数を取得
      const activeSeats = seatActive.filter(active => active).length;
      
      // 有効座席数分の生徒番号を準備（順番通り）
      const activeStudents = students.slice(0, activeSeats);
      
      // 座席に配置（右上から下に向かって、列ごとに左に移動）
      let studentIndex = 0;
      for (let c = COLS - 1; c >= 0; c--) { // 右の列から左へ
        for (let r = 0; r < ROWS; r++) { // 上から下へ
          const seatIndex = r * COLS + c;
          if (seatActive[seatIndex]) {
            seatNumbers[seatIndex] = activeStudents[studentIndex++] || "";
          } else {
            seatNumbers[seatIndex] = "";
          }
        }
      }
      
      render();
    }

    function render() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          const seatIndex = r * COLS + c;
          
          if (seatActive[seatIndex]) {
            cell.textContent = seatNumbers[seatIndex] || "";
          } else {
            cell.textContent = "×";
          }
        }
      }
    }

    /* ===== ルーレット制御 ===== */
    let timer = null;

    document.getElementById("startBtn").addEventListener("click", () => {
      if (timer) return;
      document.getElementById("stopBtn").disabled = false;
      timer = setInterval(() => {
        redistributeStudents();
      }, 150);
    });

    document.getElementById("stopBtn").addEventListener("click", () => {
      clearInterval(timer);
      timer = null;
      document.getElementById("stopBtn").disabled = true;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (timer) return; // シャッフル中は無効
      
      // 全座席を有効化
      seatActive.fill(true);
      
      // 見た目を更新
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          cell.className = "active";
        }
      }
      
      updateActiveCount();
      arrangeStudentsInOrder(); // 全座席有効化時も順番配置
    });

    /* ===== カスタム制御（行列変更） ===== */
    const rowInput = document.getElementById("rowInput");
    const colInput = document.getElementById("colInput");

    // グリッドサイズを更新する共通関数
    function updateGridSize() {
      if (timer) return; // シャッフル中は無効
      
      const newRows = parseInt(rowInput.value);
      const newCols = parseInt(colInput.value);
      
      if (newRows >= 1 && newRows <= 12 && newCols >= 1 && newCols <= 15) {
        ROWS = newRows;
        COLS = newCols;
        generateTable();
      }
    }

    // 行数制御
    document.getElementById("rowDecBtn").addEventListener("click", () => {
      if (timer) return;
      const current = parseInt(rowInput.value);
      if (current > 1) {
        rowInput.value = current - 1;
        updateGridSize();
      }
    });

    document.getElementById("rowIncBtn").addEventListener("click", () => {
      if (timer) return;
      const current = parseInt(rowInput.value);
      if (current < 12) {
        rowInput.value = current + 1;
        updateGridSize();
      }
    });

    // 列数制御
    document.getElementById("colDecBtn").addEventListener("click", () => {
      if (timer) return;
      const current = parseInt(colInput.value);
      if (current > 1) {
        colInput.value = current - 1;
        updateGridSize();
      }
    });

    document.getElementById("colIncBtn").addEventListener("click", () => {
      if (timer) return;
      const current = parseInt(colInput.value);
      if (current < 15) {
        colInput.value = current + 1;
        updateGridSize();
      }
    });

    // 入力フィールドの変更を監視（リアルタイム更新）
    rowInput.addEventListener("input", () => {
      if (!timer) {
        updateGridSize();
      }
    });

    colInput.addEventListener("input", () => {
      if (!timer) {
        updateGridSize();
      }
    });

    /* ===== Excel 出力 ===== */
    document.getElementById("downloadBtn").addEventListener("click", () => {
      // タイムスタンプ生成 (yyyymmddHHmm)
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hour = String(now.getHours()).padStart(2, '0');
      const minute = String(now.getMinutes()).padStart(2, '0');
      const timestamp = `${year}${month}${day}${hour}${minute}`;
      
      // 十分な配列サイズを確保（最大行数 + 余白）
      const maxRows = ROWS * 2 + 10; // 生徒目線 + 教師目線 + 余白
      const maxCols = Math.max(COLS, 8); // 最小8列は確保
      const aoa = new Array(maxRows).fill(null).map(() => new Array(maxCols).fill(""));
      
      // ヘッダー情報
      const centerCol = Math.floor(COLS / 2);
      aoa[0][centerCol] = "教卓(生徒目線)";
      aoa[0][maxCols - 2] = "座席シャッフルWEBアプリ（phys-ken）";
      
      // 生徒目線座席表（1行目から）
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          if (seatActive[seatIndex]) {
            aoa[r + 1][c] = seatNumbers[seatIndex] || "";
          } else {
            aoa[r + 1][c] = "×";
          }
        }
      }
      
      // 教師目線座席表の開始位置
      const teacherStartRow = ROWS + 4;
      aoa[teacherStartRow - 1][centerCol] = "教卓(教師目線)";
      
      // 教師目線座席表 - 180度回転
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          
          // 180度回転の座標変換
          const teacherRow = ROWS - 1 - r;
          const teacherCol = COLS - 1 - c;
          
          // 教師目線の配列位置
          const excelRow = teacherStartRow + teacherRow;
          const excelCol = teacherCol;
          
          if (seatActive[seatIndex]) {
            aoa[excelRow][excelCol] = seatNumbers[seatIndex] || "";
          } else {
            aoa[excelRow][excelCol] = "×";
          }
        }
      }
      
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      
      // ヘッダーセルにハイパーリンクを設定
      const linkRef = XLSX.utils.encode_cell({r: 0, c: maxCols - 2});
      if (!ws['!links']) ws['!links'] = [];
      ws['!links'].push({
        ref: linkRef,
        Target: 'https://phys-ken.github.io/Seat_Roulette/',
        Tooltip: '座席シャッフルWEBアプリ'
      });
      
      XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
      XLSX.writeFile(wb, `zaseki_custom_${ROWS}x${COLS}_${timestamp}.xlsx`);
    });

    /* ===== 初期表示 ===== */
    generateTable();
  </script>
</body>
</html>
