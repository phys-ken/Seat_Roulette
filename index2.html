<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>座席ルーレット（座席有効・無効切替対応）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── 黒板投影向け横長レイアウト ── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;  /* 黒板カラー */
      color: #fff;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 5vw;
      margin: 2vh 0 1vh;
      letter-spacing: 0.1em;
    }

    #controls {
      margin-bottom: 2vh;
    }

    button {
      font-size: 2.2vw;
      padding: 1vh 3vw;
      margin: 0 1vw;
      border: none;
      border-radius: 1vw;
      background: #2e7d32;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    table {
      border-collapse: collapse;
      width: 90vw;
      table-layout: fixed;
    }

    td {
      border: 0.4vh solid #fff;
      height: 10vh;
      text-align: center;
      font-size: 3.5vw;
      user-select: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    td.active {
      background-color: #1a1a1a;
    }

    td.inactive {
      background-color: #800;
      opacity: 0.6;
    }

    #info {
      margin-bottom: 1vh;
      font-size: 2vw;
    }
  </style>
</head>
<body>
  <h1>座席ルーレット</h1>

  <div id="info">
    有効座席数: <span id="activeCount">42</span> / 42 （座席をクリックで有効・無効切替）
  </div>

  <div id="controls">
    <button id="startBtn">シャッフル開始</button>
    <button id="stopBtn" disabled>ストップ</button>
    <button id="resetBtn">全座席有効化</button>
    <button id="downloadBtn" disabled>確定 & Excel ダウンロード</button>
  </div>

  <table id="seatTable"></table>

  <script>
    /* ===== グリッド設定：横 7 列 × 縦 6 行 ===== */
    const ROWS = 6;
    const COLS = 7;

    /* ===== 生徒番号 1〜42 を配列化 ===== */
    const students = Array.from({ length: 42 }, (_, i) => i + 1);

    // 座席の有効・無効状態を管理 (true = 有効, false = 無効)
    const seatActive = new Array(ROWS * COLS).fill(true);

    // 現在の座席配列
    const seatNumbers = [...students];

    /* ===== テーブル生成 ===== */
    const table = document.getElementById("seatTable");
    for (let r = 0; r < ROWS; r++) {
      const tr = document.createElement("tr");
      for (let c = 0; c < COLS; c++) {
        const td = document.createElement("td");
        td.id = `seat-${r}-${c}`;
        td.dataset.row = r;
        td.dataset.col = c;
        td.className = "active";
        
        // クリックイベントでの有効・無効切替
        td.addEventListener("click", () => {
          if (timer) return; // シャッフル中はクリック無効
          
          const seatIndex = r * COLS + c;
          seatActive[seatIndex] = !seatActive[seatIndex];
          
          if (seatActive[seatIndex]) {
            td.className = "active";
          } else {
            td.className = "inactive";
          }
          
          updateActiveCount();
          redistributeStudents();
        });
        
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }

    /* ===== 便利関数 ===== */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function updateActiveCount() {
      const activeSeats = seatActive.filter(active => active).length;
      document.getElementById("activeCount").textContent = activeSeats;
    }

    function redistributeStudents() {
      // 有効な座席数を取得
      const activeSeats = seatActive.filter(active => active).length;
      
      // 有効座席数分の生徒番号を準備
      const activeStudents = students.slice(0, activeSeats);
      
      // シャッフル
      shuffle(activeStudents);
      
      // 座席に配置
      let studentIndex = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          seatNumbers[seatIndex] = seatActive[seatIndex] ? (activeStudents[studentIndex++] || "") : "";
        }
      }
      
      render();
    }

    function render() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          const seatIndex = r * COLS + c;
          
          if (seatActive[seatIndex]) {
            cell.textContent = seatNumbers[seatIndex] || "";
          } else {
            cell.textContent = "×";
          }
        }
      }
    }

    /* ===== ルーレット制御 ===== */
    let timer = null;

    document.getElementById("startBtn").addEventListener("click", () => {
      if (timer) return;
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("downloadBtn").disabled = true;
      timer = setInterval(() => {
        redistributeStudents();
      }, 150);
    });

    document.getElementById("stopBtn").addEventListener("click", () => {
      clearInterval(timer);
      timer = null;
      document.getElementById("stopBtn").disabled = true;
      document.getElementById("downloadBtn").disabled = false;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (timer) return; // シャッフル中は無効
      
      // 全座席を有効化
      seatActive.fill(true);
      
      // 見た目を更新
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          cell.className = "active";
        }
      }
      
      updateActiveCount();
      redistributeStudents();
    });

    /* ===== Excel 出力 ===== */
    document.getElementById("downloadBtn").addEventListener("click", () => {
      const aoa = [];
      for (let r = 0; r < ROWS; r++) {
        aoa[r] = [];
        for (let c = 0; c < COLS; c++) {
          const seatIndex = r * COLS + c;
          if (seatActive[seatIndex]) {
            aoa[r][c] = seatNumbers[seatIndex] || "";
          } else {
            aoa[r][c] = "×";
          }
        }
      }
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      XLSX.utils.book_append_sheet(wb, ws, "座席表_生徒目線");
      XLSX.writeFile(wb, "seating_chart_student_v2.xlsx");
    });

    /* ===== 初期表示 ===== */
    redistributeStudents();
  </script>
</body>
</html>
