<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>座席ルーレット 7×7レイアウト（49席対応）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 4.5vw;
      margin: 1.5vh 0 1vh;
      letter-spacing: 0.1em;
    }

    #controls {
      margin-bottom: 1.5vh;
    }

    button {
      font-size: 2vw;
      padding: 0.8vh 2.5vw;
      margin: 0 0.8vw;
      border: none;
      border-radius: 1vw;
      background: #2e7d32;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    table {
      border-collapse: collapse;
      width: 90vw;
      table-layout: fixed;
    }

    td {
      border: 0.4vh solid #fff;
      height: 9vh;
      text-align: center;
      font-size: 3.2vw;
      user-select: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    td.active   { background-color: #1a1a1a; }
    td.inactive { background-color: #800; opacity: 0.6; }

    #info {
      margin-bottom: 1vh;
      font-size: 1.8vw;
    }

    .info-link {
      position: fixed;
      top: 1vh;
      right: 1vw;
      font-size: 1vw;
      color: #ccc;
      text-decoration: none;
      opacity: 0.7;
    }
    .info-link:hover { opacity: 1; color: #fff; text-decoration: underline; }
  </style>
</head>
<body>
  <h1>座席ルーレット (7×7)</h1>

  <a href="https://phys-ken.github.io/Seat_Roulette/" target="_blank" class="info-link">最新情報等はこちら</a>

  <div id="info">
    有効座席数: <span id="activeCount">49</span> / 49 （座席をクリックで有効・無効切替）
  </div>

  <div id="controls">
    <button id="startBtn">シャッフル開始</button>
    <button id="stopBtn" disabled>ストップ</button>
    <button id="resetBtn">全座席有効化</button>
    <button id="downloadBtn">Excel ダウンロード</button>
  </div>

  <table id="seatTable"></table>

  <script>
    const ROWS = 7;
    const COLS = 7;

    const students = Array.from({ length: ROWS * COLS }, (_, i) => i + 1);
    const seatActive = new Array(ROWS * COLS).fill(true);
    const seatNumbers = [...students];

    /* テーブル生成 */
    const table = document.getElementById("seatTable");
    for (let r = 0; r < ROWS; r++) {
      const tr = document.createElement("tr");
      for (let c = 0; c < COLS; c++) {
        const td = document.createElement("td");
        td.id = `seat-${r}-${c}`;
        td.className = "active";
        td.addEventListener("click", () => {
          if (timer) return;
          const idx = r * COLS + c;
          seatActive[idx] = !seatActive[idx];
          td.className = seatActive[idx] ? "active" : "inactive";
          updateActiveCount();
          arrangeStudentsInOrder();
        });
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }

    /* ユーティリティ */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function updateActiveCount() {
      document.getElementById("activeCount").textContent =
        seatActive.filter(Boolean).length;
    }

    function redistributeStudents() {
      const active = seatActive.filter(Boolean).length;
      const pool = students.slice(0, active);
      shuffle(pool);
      let idx = 0;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const i = r * COLS + c;
          seatNumbers[i] = seatActive[i] ? (pool[idx++] || "") : "";
        }
      render();
    }

    function arrangeStudentsInOrder() {
      const active = seatActive.filter(Boolean).length;
      const pool = students.slice(0, active);
      let idx = 0;
      for (let c = COLS - 1; c >= 0; c--)
        for (let r = 0; r < ROWS; r++) {
          const i = r * COLS + c;
          seatNumbers[i] = seatActive[i] ? (pool[idx++] || "") : "";
        }
      render();
    }

    function render() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const cell = document.getElementById(`seat-${r}-${c}`);
          const i = r * COLS + c;
          cell.textContent = seatActive[i] ? (seatNumbers[i] || "") : "×";
        }
    }

    /* ルーレット制御 */
    let timer = null;

    document.getElementById("startBtn").addEventListener("click", () => {
      if (timer) return;
      document.getElementById("stopBtn").disabled = false;
      timer = setInterval(redistributeStudents, 150);
    });

    document.getElementById("stopBtn").addEventListener("click", () => {
      clearInterval(timer);
      timer = null;
      document.getElementById("stopBtn").disabled = true;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (timer) return;
      if (!confirm("現在のルーレット結果が消えてしまいます。よろしいでしょうか？")) return;
      seatActive.fill(true);
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          document.getElementById(`seat-${r}-${c}`).className = "active";
      updateActiveCount();
      arrangeStudentsInOrder();
    });

    /* Excel 出力 */
    document.getElementById("downloadBtn").addEventListener("click", () => {
      const now = new Date();
      const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

      // 行数: ヘッダー1 + 生徒目線7 + 空白3 + 教師目線7 + フッター1 = 19行、列数: 7+1=8
      const aoa = Array.from({ length: 19 }, () => new Array(8).fill(""));
      aoa[0][3] = "教卓(生徒目線)";
      aoa[0][6] = "座席シャッフルWEBアプリ（phys-ken）";
      aoa[18][3] = "教卓(教師目線)";

      // 生徒目線 (行1〜7)
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const i = r * COLS + c;
          aoa[r + 1][c] = seatActive[i] ? (seatNumbers[i] || "") : "×";
        }

      // 教師目線 (行11〜17, 180度回転)
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const i = r * COLS + c;
          aoa[(ROWS - 1 - r) + 11][COLS - 1 - c] =
            seatActive[i] ? (seatNumbers[i] || "") : "×";
        }

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
      XLSX.writeFile(wb, `zaseki_${ts}.xlsx`);
    });

    /* 初期表示 */
    arrangeStudentsInOrder();
  </script>
</body>
</html>
