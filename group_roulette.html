<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>グループ分けルーレット</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:      #1a1a1a;
      --surface: #242424;
      --surf2:   #2c2c2c;
      --text:    #ffffff;
      --muted:   #707070;
      --accent:  #4fc3f7;
      --yellow:  #fdd663;
      --red:     #ef5350;
      --border:  #363636;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ── ボタン共通 ── */
    .btn {
      border: none; border-radius: 4px; cursor: pointer;
      font-weight: 700; font-family: inherit;
      transition: opacity 0.12s;
    }
    .btn:hover:not(:disabled) { opacity: 0.78; }
    .btn:active:not(:disabled) { opacity: 0.55; }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-primary   { background: #1565c0; color: #fff; }
    .btn-stop      { background: #b71c1c; color: #fff; }
    .btn-secondary { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }

    .stepper-btn {
      background: var(--surf2); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      width: 28px; height: 28px; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .stepper-btn:hover { background: #404040; }

    input[type="number"] {
      background: var(--surf2); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      text-align: center; font-weight: 700; font-family: inherit; padding: 3px;
    }
    input[type="number"]:focus { outline: 2px solid var(--accent); }

    /* ══════════════ 設定モード ══════════════ */
    #page-setup {
      padding: 14px 18px;
      gap: 12px;
      min-height: 100vh;
    }
    .setup-header {
      display: flex; align-items: baseline; gap: 10px;
    }
    .setup-header h1 {
      font-size: 1.3rem; font-weight: 700; color: var(--accent);
    }
    .setup-badge {
      font-size: 0.72rem; color: var(--muted);
      border: 1px solid var(--border); padding: 1px 6px; border-radius: 2px;
    }
    .setup-section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
    }
    .section-label {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .stepper-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .stepper-label {
      font-size: 0.85rem; color: var(--muted); min-width: 80px;
    }
    #total-input { width: 56px; height: 28px; font-size: 0.9rem; }
    #present-count-label { color: var(--muted); font-size: 0.82rem; }

    .absent-grid {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
    }
    .absent-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border); background: var(--surf2);
      color: var(--text); font-size: 0.8rem; font-weight: 700;
      cursor: pointer; border-radius: 0; transition: background 0.1s;
    }
    .absent-btn.absent {
      background: #303030; color: #3a3a3a; text-decoration: line-through;
    }

    .group-count-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
    }
    #group-count-input { width: 50px; height: 28px; font-size: 0.9rem; }
    #group-sizes-container { display: flex; flex-wrap: wrap; gap: 6px; }
    .group-size-item {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 7px; background: var(--surf2); border: 1px solid var(--border);
    }
    .group-size-label {
      font-size: 0.8rem; font-weight: 700; color: var(--yellow); min-width: 26px;
    }
    .group-size-input { width: 40px; height: 24px; font-size: 0.8rem; }

    #total-check {
      font-size: 0.85rem; font-weight: 700;
      margin-top: 8px; padding: 5px 8px;
      background: var(--surf2); border-left: 3px solid transparent;
      display: inline-block;
    }
    #total-check.ok   { border-color: #43a047; color: #a5d6a7; }
    #total-check.warn { border-color: var(--yellow); color: var(--yellow); }
    #total-check.err  { border-color: var(--red); color: #ef9a9a; }

    #start-roulette-btn {
      font-size: 1rem; padding: 10px 30px; align-self: center; margin-top: 4px;
    }

    /* ══════════════ ルーレットモード ══════════════ */
    #page-roulette {
      width: 100vw; height: 100vh; overflow: hidden; position: relative;
    }
    #back-to-setup-btn {
      position: absolute; top: 8px; right: 10px;
      font-size: 0.68rem; padding: 4px 10px; z-index: 20;
    }

    /* idle */
    #idle-view {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #roulette-title {
      font-size: clamp(1.1rem, 2.5vw, 1.8rem); font-weight: 700;
      color: var(--accent); text-align: center;
    }
    #big-start-btn {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      padding: clamp(12px, 2vw, 20px) clamp(28px, 5vw, 52px);
    }

    /* running */
    #roulette-view {
      display: none; flex-direction: column;
      width: 100%; flex: 1; min-height: 0;
      padding: 4px 8px 6px; gap: 8px;
    }
    #roulette-view.visible { display: flex; }
    #student-roulette-grid { flex: 1; min-height: 0; overflow: hidden; }
    #big-stop-btn {
      font-size: clamp(1rem, 2vw, 1.6rem);
      padding: 10px 36px; align-self: center; flex-shrink: 0;
    }

    /* ルーレット表 */
    .sr-table {
      width: 100%; border-collapse: collapse; table-layout: fixed;
    }
    .sr-table td {
      border: 1px solid #252525;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .sr-td-num {
      color: var(--muted); font-weight: 700;
      font-size: clamp(0.45rem, 0.95vw, 0.8rem);
      width: 3%; background: #1e1e1e;
    }
    .sr-td-grp {
      font-weight: 700;
      font-size: clamp(0.85rem, 2.2vw, 1.8rem);
      color: var(--yellow); width: 11%;
    }
    .sr-absent    { color: #2e2e2e !important; }
    .sr-absent-grp { color: #2e2e2e !important; font-size: 0.6rem !important; }
    .sr-confirmed  { color: #fff !important; }
    .sr-sep { border-right: 2px solid #3a3a3a !important; }

    /* ─── 結果エリア ─── */
    #result-area {
      display: none; flex-direction: column;
      width: 100%; flex: 1; min-height: 0;
      padding: 4px 8px 4px; gap: 6px;
    }
    #result-area.visible { display: flex; }

    /* タブ */
    .tab-row {
      display: flex; border: 1px solid var(--border); flex-shrink: 0; align-self: flex-start;
    }
    .tab-btn {
      font-size: clamp(0.75rem, 1.5vw, 1rem); font-weight: 700;
      padding: 6px 20px; background: var(--surface); color: var(--muted);
      border: none; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .tab-btn.active { background: #1565c0; color: #fff; }
    .tab-content { display: none; flex: 1; min-height: 0; overflow: hidden; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* 生徒ビュー表 */
    .sv-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .sv-table td {
      border: 1px solid #252525;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .sv-td-num {
      color: var(--muted); font-weight: 700;
      font-size: clamp(0.45rem, 0.95vw, 0.8rem);
      width: 3%; background: #1e1e1e;
    }
    .sv-td-grp {
      font-weight: 700;
      font-size: clamp(0.85rem, 2.1vw, 1.75rem);
      color: #fff; width: 11%;
    }
    .sv-absent-num { color: #2e2e2e !important; }
    .sv-absent     { color: #444 !important; font-size: 0.6rem !important; }
    .sv-sep { border-right: 2px solid #3a3a3a !important; }

    /* 班ごとビュー表 */
    .gv-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .gv-table th, .gv-table td {
      border: 1px solid #2a2a2a;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .gv-th {
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 2.2rem);
      color: var(--yellow); background: var(--surface);
      border-bottom: 2px solid #484848 !important;
    }
    .gv-td {
      font-weight: 700;
      font-size: clamp(0.95rem, 2.3vw, 2rem);
      color: #fff; background: var(--bg);
    }
    .gv-td:empty { background: #111; }

    /* 欠席フッター */
    #absent-footer {
      color: var(--muted); font-size: clamp(0.65rem, 1.3vw, 0.9rem);
      font-weight: 700; flex-shrink: 0;
    }

    /* アクションボタン */
    .result-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; flex-shrink: 0;
    }
    .result-actions .btn {
      font-size: clamp(0.7rem, 1.3vw, 0.9rem); padding: 7px 18px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     設定モード
════════════════════════════════════════════ -->
<div id="page-setup" class="page active">

  <div class="setup-header">
    <h1>グループ分けルーレット</h1>
    <span class="setup-badge">教師設定</span>
  </div>

  <div class="setup-section">
    <div class="section-label">生徒数</div>
    <div class="stepper-row">
      <span class="stepper-label">出席番号上限</span>
      <button class="stepper-btn" id="total-dec">−</button>
      <input type="number" id="total-input" value="42" min="1" max="200" />
      <button class="stepper-btn" id="total-inc">+</button>
      <span id="present-count-label"></span>
    </div>
  </div>

  <div class="setup-section">
    <div class="section-label">欠席者（クリックで選択）</div>
    <div class="absent-grid" id="absent-grid"></div>
  </div>

  <div class="setup-section">
    <div class="section-label">グループ設定</div>
    <div class="group-count-row">
      <span class="stepper-label">グループ数</span>
      <button class="stepper-btn" id="group-dec">−</button>
      <input type="number" id="group-count-input" value="6" min="1" max="30" />
      <button class="stepper-btn" id="group-inc">+</button>
    </div>
    <div id="group-sizes-container"></div>
    <div id="total-check"></div>
  </div>

  <button class="btn btn-primary" id="start-roulette-btn">ルーレット開始 ▶</button>

</div>


<!-- ═══════════════════════════════════════════
     ルーレットモード
════════════════════════════════════════════ -->
<div id="page-roulette" class="page">

  <button class="btn btn-secondary" id="back-to-setup-btn">◀ 設定</button>

  <!-- idle: スタートボタン -->
  <div id="idle-view">
    <div id="roulette-title"></div>
    <button class="btn btn-primary" id="big-start-btn">スタート ▶</button>
  </div>

  <!-- running: グリッド + ストップ -->
  <div id="roulette-view">
    <div id="student-roulette-grid"></div>
    <button class="btn btn-stop" id="big-stop-btn">ストップ ■</button>
  </div>

  <!-- stopped: 結果 -->
  <div id="result-area">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="student-tab">生徒ビュー</button>
      <button class="tab-btn" data-tab="group-tab">班ごとビュー</button>
    </div>

    <div id="student-tab" class="tab-content active">
      <div id="student-view-grid"></div>
    </div>

    <div id="group-tab" class="tab-content">
      <div id="group-view-container"></div>
    </div>

    <div id="absent-footer"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="reshuffle-btn">もう一度 ↺</button>
      <button class="btn btn-secondary" id="back-setup-result-btn">◀ 設定</button>
      <button class="btn btn-secondary" id="pdf-btn">PDF ⬇</button>
    </div>
  </div>

</div>


<script>
// ══════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════
const TABLE_ROWS = 6;
const GROUP_LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

const state = {
  totalStudents: 42,
  absentees: new Set(),
  numGroups: 6,
  groupSizes: [],       // 各班の人数 [n1, n2, ...]
  assignment: {},       // 出席番号 → 班index (0-based)
  rouletteState: 'idle', // 'idle' | 'running' | 'stopped'
  currentTab: 'student-tab',
  timer: null,
};

// ══════════════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function presentStudents() {
  const arr = [];
  for (let i = 1; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) arr.push(i);
  }
  return arr;
}

function groupLabel(idx) {
  return GROUP_LABELS[idx] || String(idx + 1);
}

// ══════════════════════════════════════════════
//  グループサイズ自動計算
// ══════════════════════════════════════════════
function autoGroupSizes() {
  const n = presentStudents().length;
  const g = state.numGroups;
  if (g <= 0) return [];
  const base = Math.floor(n / g);
  const rem  = n % g;
  const sizes = Array.from({ length: g }, (_, i) => base + (i < rem ? 1 : 0));
  return sizes;
}

function totalGroupSize() {
  return state.groupSizes.reduce((s, v) => s + v, 0);
}

// ══════════════════════════════════════════════
//  割り当てロジック
// ══════════════════════════════════════════════
function assignGroups() {
  const students = shuffle([...presentStudents()]);
  const assignment = {};
  let idx = 0;
  for (let g = 0; g < state.groupSizes.length; g++) {
    for (let k = 0; k < state.groupSizes[g]; k++) {
      if (idx >= students.length) break;
      assignment[students[idx++]] = g;
    }
  }
  state.assignment = assignment;
}

// ══════════════════════════════════════════════
//  設定モード レンダリング
// ══════════════════════════════════════════════
function renderAbsentGrid() {
  const grid = document.getElementById('absent-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= state.totalStudents; i++) {
    const btn = document.createElement('button');
    btn.className = 'absent-btn' + (state.absentees.has(i) ? ' absent' : '');
    btn.textContent = i;
    btn.dataset.num = i;
    btn.addEventListener('click', () => {
      const num = +btn.dataset.num;
      if (state.absentees.has(num)) {
        state.absentees.delete(num);
        btn.classList.remove('absent');
      } else {
        state.absentees.add(num);
        btn.classList.add('absent');
      }
      state.groupSizes = autoGroupSizes();
      renderGroupSizes();
      updatePresentLabel();
      checkTotalBalance();
    });
    grid.appendChild(btn);
  }
}

function updatePresentLabel() {
  const label = document.getElementById('present-count-label');
  const n = presentStudents().length;
  label.textContent = `（在籍 ${n} 人）`;
}

function renderGroupSizes() {
  const container = document.getElementById('group-sizes-container');
  container.innerHTML = '';

  for (let g = 0; g < state.numGroups; g++) {
    const item = document.createElement('div');
    item.className = 'group-size-item';

    const label = document.createElement('span');
    label.className = 'group-size-label';
    label.textContent = groupLabel(g) + '班';

    const decBtn = document.createElement('button');
    decBtn.className = 'stepper-btn';
    decBtn.textContent = '−';

    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'group-size-input';
    inp.min = 0;
    inp.max = state.totalStudents;
    inp.value = state.groupSizes[g] ?? 0;

    const incBtn = document.createElement('button');
    incBtn.className = 'stepper-btn';
    incBtn.textContent = '+';

    const groupIndex = g;
    decBtn.addEventListener('click', () => {
      if (state.groupSizes[groupIndex] > 0) {
        state.groupSizes[groupIndex]--;
        inp.value = state.groupSizes[groupIndex];
        checkTotalBalance();
      }
    });
    incBtn.addEventListener('click', () => {
      state.groupSizes[groupIndex]++;
      inp.value = state.groupSizes[groupIndex];
      checkTotalBalance();
    });
    inp.addEventListener('input', () => {
      const v = parseInt(inp.value);
      if (!isNaN(v) && v >= 0) {
        state.groupSizes[groupIndex] = v;
        checkTotalBalance();
      }
    });

    item.append(label, decBtn, inp, incBtn);
    container.appendChild(item);
  }
}

function checkTotalBalance() {
  const el = document.getElementById('total-check');
  const present = presentStudents().length;
  const total   = totalGroupSize();
  el.textContent = `在籍 ${present} 人 ／ グループ合計 ${total} 人`;
  if (total === present) {
    el.className = 'ok';
  } else if (Math.abs(total - present) <= 2) {
    el.className = 'warn';
  } else {
    el.className = 'err';
  }
  // 開始ボタンの有効/無効
  document.getElementById('start-roulette-btn').disabled = (total !== present || state.numGroups <= 0);
}

// ══════════════════════════════════════════════
//  設定モード — イベント
// ══════════════════════════════════════════════
function setupTotalStepper() {
  const inp  = document.getElementById('total-input');
  const dec  = document.getElementById('total-dec');
  const inc  = document.getElementById('total-inc');

  const update = (val) => {
    val = Math.max(1, Math.min(200, val));
    state.totalStudents = val;
    inp.value = val;
    // 欠席者のうち上限超えたものを削除
    [...state.absentees].forEach(n => { if (n > val) state.absentees.delete(n); });
    state.groupSizes = autoGroupSizes();
    renderAbsentGrid();
    renderGroupSizes();
    updatePresentLabel();
    checkTotalBalance();
  };

  dec.addEventListener('click', () => update(+inp.value - 1));
  inc.addEventListener('click', () => update(+inp.value + 1));
  inp.addEventListener('input', () => {
    const v = parseInt(inp.value);
    if (!isNaN(v)) update(v);
  });
}

function setupGroupStepper() {
  const inp  = document.getElementById('group-count-input');
  const dec  = document.getElementById('group-dec');
  const inc  = document.getElementById('group-inc');

  const update = (val) => {
    val = Math.max(1, Math.min(30, val));
    state.numGroups = val;
    inp.value = val;
    state.groupSizes = autoGroupSizes();
    renderGroupSizes();
    checkTotalBalance();
  };

  dec.addEventListener('click', () => update(+inp.value - 1));
  inc.addEventListener('click', () => update(+inp.value + 1));
  inp.addEventListener('input', () => {
    const v = parseInt(inp.value);
    if (!isNaN(v)) update(v);
  });
}

// ══════════════════════════════════════════════
//  ページ遷移
// ══════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToRoulette() {
  // idle 状態にリセット
  state.rouletteState = 'idle';
  state.assignment = {};

  const n  = presentStudents().length;
  const g  = state.numGroups;
  document.getElementById('roulette-title').textContent =
    `在籍 ${n} 人 → ${g} グループ`;

  document.getElementById('idle-view').style.display   = 'flex';
  document.getElementById('roulette-view').classList.remove('visible');
  document.getElementById('result-area').classList.remove('visible');

  showPage('page-roulette');
}

function goToSetup() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  showPage('page-setup');
}

// ══════════════════════════════════════════════
//  ルーレットグリッド描画
// ══════════════════════════════════════════════
function buildRouletteGrid() {
  const container = document.getElementById('student-roulette-grid');
  container.innerHTML = '';
  const colGroups = Math.ceil(state.totalStudents / TABLE_ROWS);
  const rowH = Math.max(30, Math.floor((window.innerHeight - 82) / TABLE_ROWS));
  const table = document.createElement('table');
  table.className = 'sr-table';
  for (let r = 0; r < TABLE_ROWS; r++) {
    const tr = document.createElement('tr');
    tr.style.height = rowH + 'px';
    for (let cg = 0; cg < colGroups; cg++) {
      const num = cg * TABLE_ROWS + r + 1;
      const tdNum = document.createElement('td');
      tdNum.className = 'sr-td-num';
      const tdGrp = document.createElement('td');
      if (num > state.totalStudents) {
        tdGrp.className = 'sr-td-grp';
      } else if (state.absentees.has(num)) {
        tdNum.textContent = num;
        tdNum.classList.add('sr-absent');
        tdGrp.className = 'sr-td-grp sr-absent-grp';
        tdGrp.textContent = '欠';
      } else {
        tdNum.textContent = num;
        tdGrp.className = 'sr-td-grp';
        tdGrp.id = 'srg-' + num;
        tdGrp.textContent = '?';
      }
      if (cg < colGroups - 1) tdGrp.classList.add('sr-sep');
      tr.append(tdNum, tdGrp);
    }
    table.appendChild(tr);
  }
  container.appendChild(table);
}

function updateRouletteGrid() {
  for (let i = 1; i <= state.totalStudents; i++) {
    if (state.absentees.has(i)) continue;
    const el = document.getElementById(`srg-${i}`);
    if (el) {
      const gIdx = state.assignment[i];
      el.textContent = gIdx !== undefined ? groupLabel(gIdx) + '班' : '?';
    }
  }
}

// ══════════════════════════════════════════════
//  ルーレット制御
// ══════════════════════════════════════════════
function startRoulette() {
  state.rouletteState = 'running';
  document.getElementById('idle-view').style.display = 'none';
  document.getElementById('roulette-view').classList.add('visible');
  document.getElementById('result-area').classList.remove('visible');

  buildRouletteGrid();

  state.timer = setInterval(() => {
    assignGroups();
    updateRouletteGrid();
  }, 100);
}

function stopRoulette() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.rouletteState = 'stopped';
  document.querySelectorAll('.sr-td-grp:not(.sr-absent-grp)').forEach(td => {
    td.classList.add('sr-confirmed');
  });
  setTimeout(() => {
    document.getElementById('roulette-view').classList.remove('visible');
    document.getElementById('result-area').classList.add('visible');
    renderStudentView();
    renderGroupView();
    renderAbsentFooter();
  }, 400);
}

// ══════════════════════════════════════════════
//  生徒ビュー
// ══════════════════════════════════════════════
function renderStudentView() {
  const container = document.getElementById('student-view-grid');
  container.innerHTML = '';
  const colGroups = Math.ceil(state.totalStudents / TABLE_ROWS);
  const rowH = Math.max(28, Math.floor((window.innerHeight - 148) / TABLE_ROWS));
  const table = document.createElement('table');
  table.className = 'sv-table';
  for (let r = 0; r < TABLE_ROWS; r++) {
    const tr = document.createElement('tr');
    tr.style.height = rowH + 'px';
    for (let cg = 0; cg < colGroups; cg++) {
      const num = cg * TABLE_ROWS + r + 1;
      const tdNum = document.createElement('td');
      tdNum.className = 'sv-td-num';
      const tdGrp = document.createElement('td');
      if (num > state.totalStudents) {
        tdGrp.className = 'sv-td-grp';
      } else if (state.absentees.has(num)) {
        tdNum.textContent = num;
        tdNum.classList.add('sv-absent-num');
        tdGrp.className = 'sv-td-grp sv-absent';
        tdGrp.textContent = '欠席';
      } else {
        tdNum.textContent = num;
        tdGrp.className = 'sv-td-grp';
        const gIdx = state.assignment[num];
        tdGrp.textContent = gIdx !== undefined ? groupLabel(gIdx) + '班' : '?';
      }
      if (cg < colGroups - 1) tdGrp.classList.add('sv-sep');
      tr.append(tdNum, tdGrp);
    }
    table.appendChild(tr);
  }
  container.appendChild(table);
}

// ══════════════════════════════════════════════
//  班ごとビュー
// ══════════════════════════════════════════════
function renderGroupView() {
  const container = document.getElementById('group-view-container');
  container.innerHTML = '';
  const groups = Array.from({ length: state.numGroups }, () => []);
  for (let i = 1; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) {
      const gIdx = state.assignment[i];
      if (gIdx !== undefined) groups[gIdx].push(i);
    }
  }
  const maxMembers = Math.max(...groups.map(g => g.length), 1);
  const totalRows = maxMembers + 1;
  const rowH = Math.max(28, Math.floor((window.innerHeight - 148) / totalRows));
  const table = document.createElement('table');
  table.className = 'gv-table';
  const thead = document.createElement('thead');
  const headerTr = document.createElement('tr');
  headerTr.style.height = rowH + 'px';
  groups.forEach((_, gIdx) => {
    const th = document.createElement('th');
    th.className = 'gv-th';
    th.textContent = groupLabel(gIdx) + '班';
    headerTr.appendChild(th);
  });
  thead.appendChild(headerTr);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (let r = 0; r < maxMembers; r++) {
    const tr = document.createElement('tr');
    tr.style.height = rowH + 'px';
    groups.forEach(members => {
      const td = document.createElement('td');
      td.className = 'gv-td';
      td.textContent = members[r] !== undefined ? String(members[r]) : '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);
}

function renderAbsentFooter() {
  const el = document.getElementById('absent-footer');
  if (state.absentees.size === 0) {
    el.textContent = '';
    return;
  }
  const sorted = [...state.absentees].sort((a, b) => a - b);
  el.textContent = `欠席: ${sorted.join(', ')}`;
}

// ══════════════════════════════════════════════
//  タブ切替
// ══════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabId = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
    state.currentTab = tabId;
  });
});

// ══════════════════════════════════════════════
//  PDF 生成
// ══════════════════════════════════════════════
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const now  = new Date();
  const pad  = n => String(n).padStart(2, '0');
  const ts   = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ` +
               `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const fname= `group_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}` +
               `${pad(now.getHours())}${pad(now.getMinutes())}.pdf`;

  const W = 297, H = 210; // A4 横

  // ── Page 1: 生徒ビュー ──
  doc.setFillColor(32, 33, 36);
  doc.rect(0, 0, W, H, 'F');

  // タイトル
  doc.setFontSize(14);
  doc.setTextColor(138, 180, 248);
  doc.text('グループ分けルーレット — 生徒ビュー', 10, 12);

  doc.setFontSize(9);
  doc.setTextColor(154, 160, 166);
  doc.text(ts, W - 10, 12, { align: 'right' });

  // ヘッダー行
  doc.setFontSize(9);
  doc.setTextColor(154, 160, 166);
  doc.text('出席番号  →  班', 10, 20);

  // 生徒リスト（4列）
  const colWidth  = 60;
  const rowHeight = 7;
  const startX    = 10;
  const startY    = 26;
  const maxRows   = 22;

  let col = 0, row = 0;
  for (let i = 1; i <= state.totalStudents; i++) {
    const x = startX + col * colWidth;
    const y = startY + row * rowHeight;

    if (state.absentees.has(i)) {
      doc.setTextColor(95, 99, 104);
      doc.setFontSize(10);
      doc.text(`${String(i).padStart(3,' ')}  欠席`, x, y);
    } else {
      const gIdx  = state.assignment[i];
      const gName = gIdx !== undefined ? groupLabel(gIdx) + '班' : '?';
      doc.setTextColor(129, 201, 149);
      doc.setFontSize(11);
      doc.text(`${String(i).padStart(3,' ')}  →  ${gName}`, x, y);
    }

    row++;
    if (row >= maxRows) { row = 0; col++; }
  }

  // 欠席者一覧
  if (state.absentees.size > 0) {
    const sorted = [...state.absentees].sort((a, b) => a - b);
    doc.setFontSize(9);
    doc.setTextColor(154, 160, 166);
    doc.text(`欠席者: ${sorted.join(', ')}`, 10, H - 28);
  }

  // 教師メモ欄
  doc.setFontSize(9);
  doc.setTextColor(154, 160, 166);
  doc.text('メモ:', 10, H - 20);
  doc.setDrawColor(95, 99, 104);
  doc.line(22, H - 20, W - 10, H - 20);
  doc.line(10, H - 13, W - 10, H - 13);
  doc.line(10, H - 6,  W - 10, H - 6);

  // ── Page 2: 班ごとビュー ──
  doc.addPage();
  doc.setFillColor(32, 33, 36);
  doc.rect(0, 0, W, H, 'F');

  doc.setFontSize(14);
  doc.setTextColor(138, 180, 248);
  doc.text('グループ分けルーレット — 班ごとビュー', 10, 12);

  doc.setFontSize(9);
  doc.setTextColor(154, 160, 166);
  doc.text(ts, W - 10, 12, { align: 'right' });

  // 班カード配置
  const groups = Array.from({ length: state.numGroups }, () => []);
  for (let i = 1; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) {
      const gIdx = state.assignment[i];
      if (gIdx !== undefined) groups[gIdx].push(i);
    }
  }

  const cardsPerRow = Math.min(state.numGroups, 6);
  const cardW  = (W - 20) / cardsPerRow;
  const cardH  = state.numGroups > 6 ? 70 : 85;
  const startGX = 10;
  const startGY = 20;

  groups.forEach((members, gIdx) => {
    const col = gIdx % cardsPerRow;
    const row = Math.floor(gIdx / cardsPerRow);
    const cx  = startGX + col * cardW;
    const cy  = startGY + row * (cardH + 10);

    // カード外枠
    doc.setDrawColor(95, 99, 104);
    doc.setFillColor(41, 43, 47);
    doc.roundedRect(cx, cy, cardW - 4, cardH, 3, 3, 'FD');

    // 班名
    doc.setFontSize(12);
    doc.setTextColor(138, 180, 248);
    doc.text(groupLabel(gIdx) + '班', cx + (cardW - 4) / 2, cy + 9, { align: 'center' });

    // メンバー円形配置
    const n  = members.length;
    const cr = (Math.min(cardW - 4, cardH) / 2) * 0.55;
    const mcx = cx + (cardW - 4) / 2;
    const mcy = cy + cardH / 2 + 4;

    if (n === 0) {
      // nothing
    } else if (n === 1) {
      doc.setFillColor(53, 54, 58);
      doc.setDrawColor(129, 201, 149);
      doc.circle(mcx, mcy, 7, 'FD');
      doc.setFontSize(9);
      doc.setTextColor(232, 234, 237);
      doc.text(String(members[0]), mcx, mcy + 3, { align: 'center' });
    } else if (n === 2) {
      [-1, 1].forEach((dir, k) => {
        const px = mcx + dir * 10;
        doc.setFillColor(53, 54, 58);
        doc.setDrawColor(129, 201, 149);
        doc.circle(px, mcy, 6, 'FD');
        doc.setFontSize(9);
        doc.setTextColor(232, 234, 237);
        doc.text(String(members[k]), px, mcy + 3, { align: 'center' });
      });
    } else {
      members.forEach((num, k) => {
        const angle = (2 * Math.PI * k / n) - Math.PI / 2;
        const px = mcx + cr * Math.cos(angle);
        const py = mcy + cr * Math.sin(angle);
        doc.setFillColor(53, 54, 58);
        doc.setDrawColor(129, 201, 149);
        doc.circle(px, py, 6, 'FD');
        doc.setFontSize(8);
        doc.setTextColor(232, 234, 237);
        doc.text(String(num), px, py + 3, { align: 'center' });
      });
    }

    // メモライン
    const memoY = cy + cardH - 10;
    doc.setDrawColor(95, 99, 104);
    doc.setFontSize(7);
    doc.setTextColor(95, 99, 104);
    doc.text('memo', cx + 2, memoY - 1);
    doc.line(cx + 10, memoY, cx + cardW - 6, memoY);
  });

  // 欠席者
  if (state.absentees.size > 0) {
    const sorted = [...state.absentees].sort((a, b) => a - b);
    doc.setFontSize(8);
    doc.setTextColor(95, 99, 104);
    doc.text(`欠席: ${sorted.join(', ')}`, 10, H - 6);
  }

  doc.save(fname);
}

// ══════════════════════════════════════════════
//  ボタンイベント登録
// ══════════════════════════════════════════════
document.getElementById('start-roulette-btn').addEventListener('click', () => {
  if (totalGroupSize() !== presentStudents().length) return;
  goToRoulette();
});

document.getElementById('back-to-setup-btn').addEventListener('click', goToSetup);
document.getElementById('back-setup-result-btn').addEventListener('click', goToSetup);

document.getElementById('big-start-btn').addEventListener('click', startRoulette);
document.getElementById('big-stop-btn').addEventListener('click', stopRoulette);

document.getElementById('reshuffle-btn').addEventListener('click', () => {
  goToRoulette();
});

document.getElementById('pdf-btn').addEventListener('click', downloadPDF);

// ══════════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════════
function init() {
  state.groupSizes = autoGroupSizes();
  renderAbsentGrid();
  renderGroupSizes();
  updatePresentLabel();
  checkTotalBalance();
  setupTotalStepper();
  setupGroupStepper();
}

init();
</script>
