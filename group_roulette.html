<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>グループ分けルーレット</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── 印刷用隠しエリア ── */
    #pdf-print-area {
      position: fixed; left: -9999px; top: 0; pointer-events: none;
      font-family: 'Meiryo', 'Yu Gothic', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    }
    .pdf-page {
      width: 1123px; height: 794px; background: #fff; color: #111;
      padding: 28px 32px 20px; box-sizing: border-box; overflow: hidden;
    }
    .pdf-title {
      font-size: 18px; font-weight: 700; color: #1a237e; margin-bottom: 8px;
      border-bottom: 2px solid #1a237e; padding-bottom: 4px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .pdf-title span { font-size: 11px; color: #666; font-weight: 400; }
    .pdf-sv-table {
      width: 100%; border-collapse: collapse; table-layout: fixed;
      font-size: 14px;
    }
    .pdf-sv-table td {
      border: 1px solid #ccc; text-align: center; vertical-align: middle;
      height: 26px; overflow: hidden; font-weight: 700;
    }
    .pdf-sv-num { background: #f5f5f5; color: #333; width: 6%; }
    .pdf-sv-grp { color: #1a237e; width: 8%; }
    .pdf-sv-absent-num { background: #f5f5f5; color: #aaa; width: 6%; }
    .pdf-sv-absent { color: #bbb; width: 8%; font-size: 11px; }
    .pdf-sv-sep { border-right: 2px solid #888 !important; }
    .pdf-absent-line {
      font-size: 11px; color: #666; margin-top: 6px;
    }
    .pdf-gv-table {
      width: 100%; border-collapse: collapse; table-layout: fixed;
      font-size: 18px;
    }
    .pdf-gv-table th {
      border-top: 2px solid #333; border-bottom: 3px solid #333;
      border-left: 3px solid #333; border-right: 3px solid #333;
      text-align: center; background: #1a237e;
      color: #fff; font-weight: 700; height: 38px; font-size: 20px;
    }
    .pdf-gv-table td {
      border-top: 1px solid #ddd; border-bottom: 1px solid #ddd;
      border-left: 3px solid #aaa; border-right: 3px solid #aaa;
      text-align: center; font-weight: 700;
      color: #111; vertical-align: middle; height: 34px;
    }
    .pdf-gv-table td:empty { background: #fafafa; }
    /* PDF 円卓ページ */
    .pdf-cv-wrap {
      display: grid; gap: 8px;
      width: 100%; height: calc(100% - 38px);
      align-items: center; justify-items: center;
    }
  </style>
  <style>
    :root {
      --bg:      #1a1a1a;
      --surface: #242424;
      --surf2:   #2c2c2c;
      --text:    #ffffff;
      --muted:   #707070;
      --accent:  #4fc3f7;
      --yellow:  #fdd663;
      --red:     #ef5350;
      --border:  #363636;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, 'Segoe UI', sans-serif;
    }

    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ── ボタン共通 ── */
    .btn {
      border: none; border-radius: 4px; cursor: pointer;
      font-weight: 700; font-family: inherit;
      transition: opacity 0.12s;
    }
    .btn:hover:not(:disabled) { opacity: 0.78; }
    .btn:active:not(:disabled) { opacity: 0.55; }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-primary   { background: #1565c0; color: #fff; }
    .btn-stop      { background: #b71c1c; color: #fff; }
    .btn-secondary { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }

    .stepper-btn {
      background: var(--surf2); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      width: 28px; height: 28px; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .stepper-btn:hover { background: #404040; }

    input[type="number"] {
      background: var(--surf2); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      text-align: center; font-weight: 700; font-family: inherit; padding: 3px;
    }
    input[type="number"]:focus { outline: 2px solid var(--accent); }

    /* ══════════════ 設定モード ══════════════ */
    #page-setup {
      padding: 14px 18px;
      gap: 12px;
      min-height: 100vh;
    }
    .setup-header {
      display: flex; align-items: baseline; gap: 10px;
    }
    .setup-header h1 {
      font-size: 1.3rem; font-weight: 700; color: var(--accent);
    }
    .setup-badge {
      font-size: 0.72rem; color: var(--muted);
      border: 1px solid var(--border); padding: 1px 6px; border-radius: 2px;
    }
    .setup-section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
    }
    .section-label {
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .stepper-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .stepper-label {
      font-size: 0.85rem; color: var(--muted); min-width: 80px;
    }
    #start-input,
    #total-input { width: 56px; height: 28px; font-size: 0.9rem; }
    #present-count-label { color: var(--muted); font-size: 0.82rem; }

    .absent-grid {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
    }
    .absent-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border); background: var(--surf2);
      color: var(--text); font-size: 0.8rem; font-weight: 700;
      cursor: pointer; border-radius: 0; transition: background 0.1s;
    }
    .absent-btn.absent {
      background: #303030; color: #3a3a3a; text-decoration: line-through;
    }

    .group-count-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
    }
    #group-count-input { width: 50px; height: 28px; font-size: 0.9rem; }
    #group-sizes-container { display: flex; flex-wrap: wrap; gap: 6px; }
    .group-size-item {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 7px; background: var(--surf2); border: 1px solid var(--border);
    }
    .group-size-label {
      font-size: 0.8rem; font-weight: 700; color: var(--yellow); min-width: 26px;
    }
    .group-size-input { width: 40px; height: 24px; font-size: 0.8rem; }

    #total-check {
      font-size: 0.85rem; font-weight: 700;
      margin-top: 8px; padding: 5px 8px;
      background: var(--surf2); border-left: 3px solid transparent;
      display: inline-block;
    }
    #total-check.ok   { border-color: #43a047; color: #a5d6a7; }
    #total-check.warn { border-color: var(--yellow); color: var(--yellow); }
    #total-check.err  { border-color: var(--red); color: #ef9a9a; }

    #start-roulette-btn {
      font-size: 1rem; padding: 10px 30px; align-self: center; margin-top: 4px;
    }

    /* ══════════════ ルーレットモード ══════════════ */
    #page-roulette {
      width: 100vw; height: 100vh; overflow: hidden; position: relative;
    }
    #back-to-setup-btn {
      position: absolute; top: 8px; right: 10px;
      font-size: 0.68rem; padding: 4px 10px; z-index: 20;
    }

    /* idle */
    #idle-view {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #roulette-title {
      font-size: clamp(1.1rem, 2.5vw, 1.8rem); font-weight: 700;
      color: var(--accent); text-align: center;
    }
    #big-start-btn {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      padding: clamp(12px, 2vw, 20px) clamp(28px, 5vw, 52px);
    }

    /* running */
    #roulette-view {
      display: none; flex-direction: column;
      width: 100%; flex: 1; min-height: 0;
      padding: 4px 8px 6px; gap: 8px;
    }
    #roulette-view.visible { display: flex; }
    #student-roulette-grid { flex: 1; min-height: 0; overflow: hidden; }
    #big-stop-btn {
      font-size: clamp(1rem, 2vw, 1.6rem);
      padding: 10px 36px; align-self: center; flex-shrink: 0;
    }

    /* ルーレット表 */
    .sr-table {
      width: 100%; border-collapse: collapse; table-layout: fixed;
    }
    .sr-table td {
      border: 1px solid #444;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .sr-td-num {
      color: #fff; font-weight: 700;
      font-size: clamp(1.1rem, 2.9vw, 2.6rem);
      width: 5%; background: #0d1117;
    }
    .sr-td-grp {
      font-weight: 700;
      font-size: clamp(1.1rem, 2.9vw, 2.6rem);
      color: var(--yellow); width: 9%;
    }
    .sr-absent    { color: #555 !important; }
    .sr-absent-grp { color: #555 !important; font-size: 0.75rem !important; }
    .sr-confirmed  { color: #fff !important; }
    .sr-sep       { border-right: 3px solid #888 !important; }
    .sr-grp-start { border-left:  3px solid #888 !important; }

    /* ─── 結果エリア ─── */
    #result-area {
      display: none; flex-direction: column;
      width: 100%; flex: 1; min-height: 0;
      padding: 4px 8px 4px; gap: 6px;
    }
    #result-area.visible { display: flex; }

    /* タブ */
    .tab-row {
      display: flex; border: 1px solid var(--border); flex-shrink: 0; align-self: flex-start;
    }
    .tab-btn {
      font-size: clamp(0.75rem, 1.5vw, 1rem); font-weight: 700;
      padding: 6px 20px; background: var(--surface); color: var(--muted);
      border: none; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .tab-btn.active { background: #1565c0; color: #fff; }
    .tab-content { display: none; flex: 1; min-height: 0; overflow: hidden; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* 生徒ビュー表 */
    .sv-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .sv-table td {
      border: 1px solid #252525;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .sv-td-num {
      color: #fff; font-weight: 700;
      font-size: clamp(1.1rem, 2.8vw, 2.5rem);
      width: 5%; background: #0d1117;
    }
    .sv-td-grp {
      font-weight: 700;
      font-size: clamp(1.1rem, 2.8vw, 2.5rem);
      color: var(--yellow); width: 9%;
    }
    .sv-absent-num { color: #555 !important; }
    .sv-absent     { color: #555 !important; font-size: 0.75rem !important; }
    .sv-sep       { border-right: 3px solid #888 !important; }
    .sv-grp-start { border-left:  3px solid #888 !important; }

    /* 班ごとビュー表 */
    .gv-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .gv-table th, .gv-table td {
      border-top: 1px solid #2a2a2a;
      border-bottom: 1px solid #2a2a2a;
      border-left: 3px solid #555;
      border-right: 3px solid #555;
      text-align: center; vertical-align: middle; overflow: hidden;
    }
    .gv-th {
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 2.8rem);
      color: var(--yellow); background: var(--surface);
      border-bottom: 3px solid #888 !important;
      padding: 0 !important;
    }
    .gv-td {
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 2.8rem);
      color: #fff; background: var(--bg);
      padding: 0 !important;
    }
    .gv-td:empty { background: #111; }

    /* 円卓ビュー */
    .cv-wrap {
      flex: 1; width: 100%; display: grid; gap: 4px;
      align-content: center; justify-content: center; overflow: hidden;
    }
    .cv-group-svg { display: block; }

    /* 欠席フッター */
    #absent-footer {
      color: var(--muted); font-size: clamp(0.65rem, 1.3vw, 0.9rem);
      font-weight: 700; flex-shrink: 0;
    }

    /* アクションボタン */
    .result-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; flex-shrink: 0;
    }
    .result-actions .btn {
      font-size: clamp(0.7rem, 1.3vw, 0.9rem); padding: 7px 18px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     設定モード
════════════════════════════════════════════ -->
<div id="page-setup" class="page active">

  <div class="setup-header">
    <h1>グループ分けルーレット</h1>
    <span class="setup-badge">教師設定</span>
  </div>

  <div class="setup-section">
    <div class="section-label">生徒数</div>
    <div class="stepper-row">
      <span class="stepper-label">出席番号下限</span>
      <button class="stepper-btn" id="start-dec">−</button>
      <input type="number" id="start-input" value="1" min="1" max="200" />
      <button class="stepper-btn" id="start-inc">+</button>
    </div>
    <div class="stepper-row" style="margin-top:6px">
      <span class="stepper-label">出席番号上限</span>
      <button class="stepper-btn" id="total-dec">−</button>
      <input type="number" id="total-input" value="42" min="1" max="200" />
      <button class="stepper-btn" id="total-inc">+</button>
      <span id="present-count-label"></span>
    </div>
  </div>

  <div class="setup-section">
    <div class="section-label">欠席者（クリックで選択）</div>
    <div class="absent-grid" id="absent-grid"></div>
  </div>

  <div class="setup-section">
    <div class="section-label">グループ設定</div>
    <div class="group-count-row">
      <span class="stepper-label">グループ数</span>
      <button class="stepper-btn" id="group-dec">−</button>
      <input type="number" id="group-count-input" value="6" min="1" max="30" />
      <button class="stepper-btn" id="group-inc">+</button>
    </div>
    <div id="group-sizes-container"></div>
    <div id="total-check"></div>
  </div>

  <button class="btn btn-primary" id="start-roulette-btn">ルーレット開始 ▶</button>

</div>


<!-- ═══════════════════════════════════════════
     ルーレットモード
════════════════════════════════════════════ -->
<div id="page-roulette" class="page">

  <button class="btn btn-secondary" id="back-to-setup-btn">◀ 設定</button>

  <!-- idle: スタートボタン -->
  <div id="idle-view">
    <div id="roulette-title"></div>
    <button class="btn btn-primary" id="big-start-btn">スタート ▶</button>
  </div>

  <!-- running: グリッド + ストップ -->
  <div id="roulette-view">
    <div id="student-roulette-grid"></div>
    <button class="btn btn-stop" id="big-stop-btn">ストップ ■</button>
  </div>

  <!-- stopped: 結果 -->
  <div id="result-area">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="student-tab">生徒ビュー</button>
      <button class="tab-btn" data-tab="group-tab">班ごとビュー</button>
      <button class="tab-btn" data-tab="circle-tab">円卓ビュー</button>
    </div>

    <div id="student-tab" class="tab-content active">
      <div id="student-view-grid"></div>
    </div>

    <div id="group-tab" class="tab-content">
      <div id="group-view-container"></div>
    </div>

    <div id="circle-tab" class="tab-content">
      <div id="circle-view-container" style="display:flex;flex:1;min-height:0;overflow:hidden;width:100%;"></div>
    </div>

    <div id="absent-footer"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="reshuffle-btn">もう一度 ↺</button>
      <button class="btn btn-secondary" id="back-setup-result-btn">◀ 設定</button>
      <button class="btn btn-secondary" id="pdf-btn">PDF ⬇</button>
    </div>
  </div>

</div>


<script>
// ══════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════
const TABLE_ROWS = 6;
const GROUP_LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

const state = {
  totalStudents: 42,
  startNum: 1,
  absentees: new Set(),
  numGroups: 6,
  groupSizes: [],       // 各班の人数 [n1, n2, ...]
  assignment: {},       // 出席番号 → 班index (0-based)
  rouletteState: 'idle', // 'idle' | 'running' | 'stopped'
  currentTab: 'student-tab',
  timer: null,
};

// ══════════════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function presentStudents() {
  const arr = [];
  for (let i = state.startNum; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) arr.push(i);
  }
  return arr;
}

function groupLabel(idx) {
  return GROUP_LABELS[idx] || String(idx + 1);
}

// ══════════════════════════════════════════════
//  グループサイズ自動計算
// ══════════════════════════════════════════════
function autoGroupSizes() {
  const n = presentStudents().length;
  const g = state.numGroups;
  if (g <= 0) return [];
  const base = Math.floor(n / g);
  const rem  = n % g;
  const sizes = Array.from({ length: g }, (_, i) => base + (i < rem ? 1 : 0));
  return sizes;
}

function totalGroupSize() {
  return state.groupSizes.reduce((s, v) => s + v, 0);
}

// ══════════════════════════════════════════════
//  割り当てロジック
// ══════════════════════════════════════════════
function assignGroups() {
  const students = shuffle([...presentStudents()]);
  const assignment = {};
  let idx = 0;
  for (let g = 0; g < state.groupSizes.length; g++) {
    for (let k = 0; k < state.groupSizes[g]; k++) {
      if (idx >= students.length) break;
      assignment[students[idx++]] = g;
    }
  }
  state.assignment = assignment;
}

// ══════════════════════════════════════════════
//  設定モード レンダリング
// ══════════════════════════════════════════════
function renderAbsentGrid() {
  const grid = document.getElementById('absent-grid');
  grid.innerHTML = '';
  for (let i = state.startNum; i <= state.totalStudents; i++) {
    const btn = document.createElement('button');
    btn.className = 'absent-btn' + (state.absentees.has(i) ? ' absent' : '');
    btn.textContent = i;
    btn.dataset.num = i;
    btn.addEventListener('click', () => {
      const num = +btn.dataset.num;
      if (state.absentees.has(num)) {
        state.absentees.delete(num);
        btn.classList.remove('absent');
      } else {
        state.absentees.add(num);
        btn.classList.add('absent');
      }
      state.groupSizes = autoGroupSizes();
      renderGroupSizes();
      updatePresentLabel();
      checkTotalBalance();
    });
    grid.appendChild(btn);
  }
}

function updatePresentLabel() {
  const label = document.getElementById('present-count-label');
  const n = presentStudents().length;
  label.textContent = `（在籍 ${n} 人）`;
}

function renderGroupSizes() {
  const container = document.getElementById('group-sizes-container');
  container.innerHTML = '';

  for (let g = 0; g < state.numGroups; g++) {
    const item = document.createElement('div');
    item.className = 'group-size-item';

    const label = document.createElement('span');
    label.className = 'group-size-label';
    label.textContent = groupLabel(g);

    const decBtn = document.createElement('button');
    decBtn.className = 'stepper-btn';
    decBtn.textContent = '−';

    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'group-size-input';
    inp.min = 0;
    inp.max = state.totalStudents;
    inp.value = state.groupSizes[g] ?? 0;

    const incBtn = document.createElement('button');
    incBtn.className = 'stepper-btn';
    incBtn.textContent = '+';

    const groupIndex = g;
    decBtn.addEventListener('click', () => {
      if (state.groupSizes[groupIndex] > 0) {
        state.groupSizes[groupIndex]--;
        inp.value = state.groupSizes[groupIndex];
        checkTotalBalance();
      }
    });
    incBtn.addEventListener('click', () => {
      state.groupSizes[groupIndex]++;
      inp.value = state.groupSizes[groupIndex];
      checkTotalBalance();
    });
    inp.addEventListener('input', () => {
      const v = parseInt(inp.value);
      if (!isNaN(v) && v >= 0) {
        state.groupSizes[groupIndex] = v;
        checkTotalBalance();
      }
    });

    item.append(label, decBtn, inp, incBtn);
    container.appendChild(item);
  }
}

function checkTotalBalance() {
  const el = document.getElementById('total-check');
  const present = presentStudents().length;
  const total   = totalGroupSize();
  el.textContent = `在籍 ${present} 人 ／ グループ合計 ${total} 人`;
  if (total === present) {
    el.className = 'ok';
  } else if (Math.abs(total - present) <= 2) {
    el.className = 'warn';
  } else {
    el.className = 'err';
  }
  // 開始ボタンの有効/無効
  document.getElementById('start-roulette-btn').disabled = (total !== present || state.numGroups <= 0);
}

// ══════════════════════════════════════════════
//  設定モード — イベント
// ══════════════════════════════════════════════
function setupTotalStepper() {
  const inp  = document.getElementById('total-input');
  const dec  = document.getElementById('total-dec');
  const inc  = document.getElementById('total-inc');

  const update = (val) => {
    val = Math.max(state.startNum, Math.min(200, val));
    state.totalStudents = val;
    inp.value = val;
    // 欠席者のうち範囲外のものを削除
    [...state.absentees].forEach(n => { if (n > val || n < state.startNum) state.absentees.delete(n); });
    state.groupSizes = autoGroupSizes();
    renderAbsentGrid();
    renderGroupSizes();
    updatePresentLabel();
    checkTotalBalance();
  };

  dec.addEventListener('click', () => update(+inp.value - 1));
  inc.addEventListener('click', () => update(+inp.value + 1));
  inp.addEventListener('input', () => {
    const v = parseInt(inp.value);
    if (!isNaN(v)) update(v);
  });

// ══════════════════════════════════════════════
//  ルーレットグリッド描画
// ══════════════════════════════════════════════
function buildRouletteGrid() {
  const container = document.getElementById('student-roulette-grid');
  container.innerHTML = '';
  const numStudents = state.totalStudents - state.startNum + 1;
  const colGroups = Math.ceil(numStudents / TABLE_ROWS);
  const rowH = Math.max(30, Math.floor((window.innerHeight - 82) / TABLE_ROWS));
  const table = document.createElement('table');
  table.className = 'sr-table';
  for (let r = 0; r < TABLE_ROWS; r++) {
    const tr = document.createElement('tr');
    tr.style.height = rowH + 'px';
    for (let cg = 0; cg < colGroups; cg++) {
      const num = cg * TABLE_ROWS + r + state.startNum;
      const tdNum = document.createElement('td');
      tdNum.className = 'sr-td-num';
      const tdGrp = document.createElement('td');
      if (num > state.totalStudents) {
        tdGrp.className = 'sr-td-grp';
      } else if (state.absentees.has(num)) {
        tdNum.textContent = num;
        tdNum.classList.add('sr-absent');
        tdGrp.className = 'sr-td-grp sr-absent-grp';
        tdGrp.textContent = '欠';
      } else {
        tdNum.textContent = num;
        tdGrp.className = 'sr-td-grp';
        tdGrp.id = 'srg-' + num;
        tdGrp.textContent = '?';
      }
      if (cg < colGroups - 1) tdGrp.classList.add('sr-sep');
      if (cg > 0) tdNum.classList.add('sr-grp-start');
      tr.append(tdNum, tdGrp);
    }
    table.appendChild(tr);
  }
  container.appendChild(table);
}

function updateRouletteGrid() {
  for (let i = state.startNum; i <= state.totalStudents; i++) {
    if (state.absentees.has(i)) continue;
    const el = document.getElementById(`srg-${i}`);
    if (el) {
      const gIdx = state.assignment[i];
      el.textContent = gIdx !== undefined ? groupLabel(gIdx) : '?';
    }
  }
}

// ══════════════════════════════════════════════
//  ルーレット制御
// ══════════════════════════════════════════════
function startRoulette() {
  state.rouletteState = 'running';
  document.getElementById('idle-view').style.display = 'none';
  document.getElementById('roulette-view').classList.add('visible');
  document.getElementById('result-area').classList.remove('visible');

  buildRouletteGrid();

  state.timer = setInterval(() => {
    assignGroups();
    updateRouletteGrid();
  }, 100);
}

function stopRoulette() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.rouletteState = 'stopped';
  document.querySelectorAll('.sr-td-grp:not(.sr-absent-grp)').forEach(td => {
    td.classList.add('sr-confirmed');
  });
  setTimeout(() => {
    document.getElementById('roulette-view').classList.remove('visible');
    document.getElementById('result-area').classList.add('visible');
    renderStudentView();
    renderGroupView();
    renderCircleView();
    renderAbsentFooter();
  }, 400);
}

// ══════════════════════════════════════════════
//  スパイダー討論SVGヘルパー（PDF円卓ビュー用）
// ══════════════════════════════════════════════
function makeSpiderSVG(title, members, w, h) {
  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 240 240');
  svg.setAttribute('width',  w);
  svg.setAttribute('height', h);

  const cx = 120, cy = 120, orbitR = 90, seatR = 18;

  const mkEl = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
  };

  // 背景
  svg.appendChild(mkEl('rect', { width: 240, height: 240, fill: '#fff' }));

  const n = members.length || 1;
  // 各座席の座標
  const pts = members.map((_, k) => {
    const angle = (2 * Math.PI * k / n) - Math.PI / 2;
    return { x: cx + orbitR * Math.cos(angle), y: cy + orbitR * Math.sin(angle) };
  });

  // グループラベル（中央）
  const lbl = mkEl('text', { x: cx, y: cy + 7, 'text-anchor': 'middle',
    fill: '#1d4ed8', 'font-size': 22, 'font-weight': 'bold', opacity: 0.25 });
  lbl.textContent = title;
  svg.appendChild(lbl);

  // 多角形外枠線（隣同士のみ）
  for (let i = 0; i < n; i++) {
    const a = pts[i], b = pts[(i + 1) % n];
    svg.appendChild(mkEl('line', {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      stroke: '#93c5fd', 'stroke-width': 1.5
    }));
  }

  // 座席（円＋番号）
  members.forEach((num, k) => {
    const { x: px, y: py } = pts[k];
    svg.appendChild(mkEl('circle', { cx: px, cy: py, r: seatR,
      fill: '#fff', stroke: '#1d4ed8', 'stroke-width': 2.2 }));
    const fs = String(num).length > 1 ? 15 : 18;
    const txt = mkEl('text', { x: px, y: py + 6, 'text-anchor': 'middle',
      fill: '#111', 'font-size': fs, 'font-weight': 'bold' });
    txt.textContent = String(num);
    svg.appendChild(txt);
  });

  return svg;
}

// ══════════════════════════════════════════════
//  円卓SVGヘルパー
// ══════════════════════════════════════════════
function makeCircleGroupSVG(title, members, w, h, darkTheme) {
  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 200 200');
  svg.setAttribute('width',  w);
  svg.setAttribute('height', h);

  const cx = 100, cy = 100, orbitR = 80, seatR = 16;

  const bg       = darkTheme ? '#111' : '#fff';
  const labelCol = darkTheme ? '#fdd663' : '#1d4ed8';
  const seatFill = darkTheme ? '#111' : '#fff';
  const seatStk  = darkTheme ? '#fdd663' : '#1d4ed8';
  const numCol   = darkTheme ? '#fff' : '#111';

  const mkEl = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
  };

  svg.appendChild(mkEl('rect', { width: 200, height: 200, fill: bg }));

  // グループラベル（中央、円なし・線なし）
  const lbl = mkEl('text', { x: cx, y: cy + 12, 'text-anchor': 'middle',
    fill: labelCol, 'font-size': 34, 'font-weight': 'bold',
    opacity: darkTheme ? '0.5' : '0.15' });
  lbl.textContent = title;
  svg.appendChild(lbl);

  const n = members.length || 1;
  const pts = members.map((_, k) => {
    const angle = (2 * Math.PI * k / n) - Math.PI / 2;
    return { x: cx + orbitR * Math.cos(angle), y: cy + orbitR * Math.sin(angle) };
  });

  // 多角形外枠線（隣同士のみ）
  const lineCol = darkTheme ? '#fdd663' : '#93c5fd';
  for (let i = 0; i < n; i++) {
    const a = pts[i], b = pts[(i + 1) % n];
    svg.appendChild(mkEl('line', {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      stroke: lineCol, 'stroke-width': 1.5
    }));
  }

  // 座席（円＋番号）
  members.forEach((num, k) => {
    const { x: px, y: py } = pts[k];
    svg.appendChild(mkEl('circle', { cx: px, cy: py, r: seatR,
      fill: seatFill, stroke: seatStk, 'stroke-width': 2.5 }));

    const fs = String(num).length > 1 ? 13 : 16;
    const txt = mkEl('text', { x: px, y: py + 5.5, 'text-anchor': 'middle',
      fill: numCol, 'font-size': fs, 'font-weight': 'bold' });
    txt.textContent = String(num);
    svg.appendChild(txt);
  });

  return svg;
}

// ══════════════════════════════════════════════
//  円卓ビュー
// ══════════════════════════════════════════════
function renderCircleView() {
  const container = document.getElementById('circle-view-container');
  container.innerHTML = '';

  const groups = Array.from({ length: state.numGroups }, () => []);
  for (let i = state.startNum; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) {
      const gIdx = state.assignment[i];
      if (gIdx !== undefined) groups[gIdx].push(i);
    }
  }

  const cols = state.numGroups <= 4 ? state.numGroups
             : state.numGroups <= 6 ? 3
             : state.numGroups <= 9 ? 3 : 4;
  const rows = Math.ceil(state.numGroups / cols);
  const avW  = (window.innerWidth  - 16) / cols;
  const avH  = (window.innerHeight - 148) / rows;
  const size = Math.floor(Math.min(avW, avH)) - 6;

  const wrap = document.createElement('div');
  wrap.className = 'cv-wrap';
  wrap.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
  container.appendChild(wrap);

  groups.forEach((members, gIdx) => {
    const svg = makeCircleGroupSVG(groupLabel(gIdx), members, size, size, true);
    svg.className = 'cv-group-svg';
    wrap.appendChild(svg);
  });
}

function renderAbsentFooter() {

  }
  const sorted = [...state.absentees].sort((a, b) => a - b);
  el.textContent = `欠席: ${sorted.join(', ')}`;

// ══════════════════════════════════════════════
//  PDF 生成
// ══════════════════════════════════════════════
async function downloadPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = '生成中…';

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ts  = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const fname = `group_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}.pdf`;

  const TABLE_ROWS_PDF = 6;

  // ─── Page1: 生徒ビュー ───
  const page1 = document.getElementById('pdf-page-1');
  page1.innerHTML = '';
  const title1 = document.createElement('div');
  title1.className = 'pdf-title';
  title1.innerHTML = `グループ分けルーレット — 生徒ビュー <span>${ts}</span>`;
  page1.appendChild(title1);

  const colGroups = Math.ceil((state.totalStudents - state.startNum + 1) / TABLE_ROWS_PDF);
  const tbl1 = document.createElement('table');
  tbl1.className = 'pdf-sv-table';
  for (let r = 0; r < TABLE_ROWS_PDF; r++) {
    const tr = document.createElement('tr');
    for (let cg = 0; cg < colGroups; cg++) {
      const num = cg * TABLE_ROWS_PDF + r + state.startNum;
      const tdN = document.createElement('td');
      const tdG = document.createElement('td');
      if (num > state.totalStudents) {
        tdN.className = 'pdf-sv-num';
        tdG.className = 'pdf-sv-grp';
      } else if (state.absentees.has(num)) {
        tdN.className = 'pdf-sv-absent-num'; tdN.textContent = num;
        tdG.className = 'pdf-sv-absent'; tdG.textContent = '欠席';
      } else {
        tdN.className = 'pdf-sv-num'; tdN.textContent = num;
        const gIdx = state.assignment[num];
        tdG.className = 'pdf-sv-grp';
        tdG.textContent = gIdx !== undefined ? groupLabel(gIdx) : '?';
      }
      if (cg < colGroups - 1) tdG.classList.add('pdf-sv-sep');
      tr.append(tdN, tdG);
    }
    tbl1.appendChild(tr);
  }
  page1.appendChild(tbl1);

  if (state.absentees.size > 0) {
    const sorted = [...state.absentees].sort((a, b) => a - b);
    const absent = document.createElement('div');
    absent.className = 'pdf-absent-line';
    absent.textContent = '欠席者: ' + sorted.join(', ');
    page1.appendChild(absent);
  }

  // ─── Page2: 班ごとビュー ───
  const page2 = document.getElementById('pdf-page-2');
  page2.innerHTML = '';
  const title2 = document.createElement('div');
  title2.className = 'pdf-title';
  title2.innerHTML = `グループ分けルーレット — 班ごとビュー <span>${ts}</span>`;
  page2.appendChild(title2);

  const groups = Array.from({ length: state.numGroups }, () => []);
  for (let i = state.startNum; i <= state.totalStudents; i++) {
    if (!state.absentees.has(i)) {
      const g = state.assignment[i];
      if (g !== undefined) groups[g].push(i);
    }
  }
  const maxM = Math.max(...groups.map(g => g.length), 1);
  const tbl2 = document.createElement('table');
  tbl2.className = 'pdf-gv-table';
  const thead = document.createElement('thead');
  const htr = document.createElement('tr');
  groups.forEach((_, gi) => {
    const th = document.createElement('th');
    th.textContent = groupLabel(gi);
    htr.appendChild(th);
  });
  thead.appendChild(htr);
  tbl2.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (let r = 0; r < maxM; r++) {
    const tr = document.createElement('tr');
    groups.forEach(members => {
      const td = document.createElement('td');
      td.textContent = members[r] !== undefined ? String(members[r]) : '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  tbl2.appendChild(tbody);
  page2.appendChild(tbl2);

  if (state.absentees.size > 0) {
    const sorted = [...state.absentees].sort((a, b) => a - b);
    const absent = document.createElement('div');
    absent.className = 'pdf-absent-line';
    absent.textContent = '欠席者: ' + sorted.join(', ');
    page2.appendChild(absent);
  }

  // ─── Page3: 円卓ビュー ───
  const page3 = document.getElementById('pdf-page-3');
  page3.innerHTML = '';
  const title3 = document.createElement('div');
  title3.className = 'pdf-title';
  title3.innerHTML = `グループ分けルーレット — 円卓ビュー <span>${ts}</span>`;
  page3.appendChild(title3);
  {
    const groups3 = Array.from({ length: state.numGroups }, () => []);
    for (let i = state.startNum; i <= state.totalStudents; i++) {
      if (!state.absentees.has(i)) {
        const g = state.assignment[i];
        if (g !== undefined) groups3[g].push(i);
      }
    }
    const cols3 = state.numGroups <= 4 ? state.numGroups
                : state.numGroups <= 6 ? 3
                : state.numGroups <= 9 ? 3 : 4;
    const rows3  = Math.ceil(state.numGroups / cols3);
    const cellW3 = Math.floor(1063 / cols3);
    const cellH3 = Math.floor(726  / rows3);
    const sz3    = Math.min(cellW3, cellH3) - 8;
    const wrap3  = document.createElement('div');
    wrap3.className = 'pdf-cv-wrap';
    wrap3.style.gridTemplateColumns = `repeat(${cols3}, ${sz3}px)`;
    page3.appendChild(wrap3);
    groups3.forEach((members, gi) => {
      const svg = makeSpiderSVG(groupLabel(gi), members, sz3, sz3);
      wrap3.appendChild(svg);
    });
  }

  // ─── html2canvas → jsPDF ───
  try {
    const opts = { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false };
    const [c1, c2, c3] = await Promise.all([
      html2canvas(page1, opts),
      html2canvas(page2, opts),
      html2canvas(page3, opts),
    ]);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const W = 297, H = 210;
    doc.addImage(c1.toDataURL('image/jpeg', 0.97), 'JPEG', 0, 0, W, H);
    doc.addPage();
    doc.addImage(c2.toDataURL('image/jpeg', 0.97), 'JPEG', 0, 0, W, H);
    doc.addPage();
    doc.addImage(c3.toDataURL('image/jpeg', 0.97), 'JPEG', 0, 0, W, H);
    doc.save(fname);
  } finally {
    btn.disabled = false;
    btn.textContent = 'PDF ⬇';
  }
}

document.getElementById('start-roulette-btn').addEventListener('click', () => {
  if (totalGroupSize() !== presentStudents().length) return;
  goToRoulette();
});

document.getElementById('back-to-setup-btn').addEventListener('click', goToSetup);
document.getElementById('back-setup-result-btn').addEventListener('click', goToSetup);

document.getElementById('big-start-btn').addEventListener('click', startRoulette);
document.getElementById('big-stop-btn').addEventListener('click', stopRoulette);

document.getElementById('reshuffle-btn').addEventListener('click', () => {
  goToRoulette();
});

document.getElementById('pdf-btn').addEventListener('click', downloadPDF);

  state.groupSizes = autoGroupSizes();

  renderGroupSizes();
  updatePresentLabel();
  checkTotalBalance();
  setupStartStepper();

  setupGroupStepper();
}

init();
